# nginx-cdp.conf — Proxy para o Chromium CDP
# Escuta na porta 9223 e proxy para 9222 com fix do Host header
# (necessário pois o Chrome só aceita conexões WebSocket com Host: localhost)
#
# Este arquivo é montado SEPARADO do nginx principal (:8080).
# É iniciado como processo independente pelo supervisord.

events {
    worker_connections 64;
}

pid /tmp/nginx-cdp.pid;

http {
    server {
        listen 9223;
        
        location / {
            proxy_pass http://127.0.0.1:9222;
            proxy_set_header Host localhost;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
            proxy_connect_timeout 10s;
        }
    }
}
